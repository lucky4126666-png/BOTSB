html
<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Admin Panel{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <i class="bi bi-shield-lock-fill"></i>
      <div>
        <div class="brand-title">BOT Admin</div>
        <div class="brand-sub">Control Panel</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="{{ url_for('dashboard') }}" class="nav-link {% if active_page=='dashboard' %}active{% endif %}">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a href="{{ url_for('admins') }}" class="nav-link {% if active_page=='admins' %}active{% endif %}">
        <i class="bi bi-people"></i> Admins
      </a>
      <a href="{{ url_for('groups') }}" class="nav-link {% if active_page=='groups' %}active{% endif %}">
        <i class="bi bi-collection"></i> Groups
      </a>
      <a href="{{ url_for('keywords') }}" class="nav-link {% if active_page=='keywords' %}active{% endif %}">
        <i class="bi bi-lightning-charge"></i> Keywords
      </a>
      <a href="{{ url_for('welcome') }}" class="nav-link {% if active_page=='welcome' %}active{% endif %}">
        <i class="bi bi-chat-heart"></i> Welcome
      </a>
      <a href="{{ url_for('auto') }}" class="nav-link {% if active_page=='auto' %}active{% endif %}">
        <i class="bi bi-calendar2-check"></i> Auto
      </a>
      <a href="{{ url_for('logs') }}" class="nav-link {% if active_page=='logs' %}active{% endif %}">
        <i class="bi bi-journal-text"></i> Logs
      </a>
      <a href="{{ url_for('login') }}" class="nav-link">
        <i class="bi bi-box-arrow-right"></i> Logout
      </a>
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
        <div class="page-subtitle">{% block page_subtitle %}{% endblock %}</div>
      </div>
      <div class="topbar-right">
        <span class="badge text-bg-dark">YEAR {{ current_year }}</span>
      </div>
    </header>

    {% block content %}{% endblock %}
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
