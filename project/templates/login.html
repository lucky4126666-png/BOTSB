<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="auth-logo mx-auto mb-3">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1 class="auth-title">Đăng nhập Admin</h1>
        <p class="auth-subtitle">BOT Web Panel</p>
      </div>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('login_post') }}">
        <div class="mb-3">
          <label class="form-label text-secondary">WEB_ADMIN_KEY</label>
          <input
            type="password"
            name="key"
            class="form-control form-control-dark"
            placeholder="Nhập key quản trị"
            required
            autofocus
          >
        </div>

        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i> Đăng nhập
        </button>
      </form>

      <div class="text-center mt-3 small text-secondary">
        Sau khi đăng nhập, bạn sẽ vào dashboard.
      </div>
    </div>
  </div>
</body>
</html>
